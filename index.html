<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MPL ID Season 17 Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">


    <link rel="stylesheet" href="/src/style.css">
    <style type="text/css">
      body {

        background-color: #020210;
        color: white;
        overflow-x: hidden;
        font-family: 'Inter', sans-serif;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 1.5rem;
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      .bracket-match { 
        width: 180px;
        transition: transform 0.2s ease;
      }
      @media (min-width: 640px) {
        .bracket-match { width: 240px; }
      }
      .bracket-team-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.5rem 0.75rem;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 0.75rem;
        transition: all 0.2s;
      }
      @media (min-width: 640px) {
        .bracket-team-row { padding: 0.7rem 0.9rem; }
      }
      .bracket-team-row.winner {
        background: rgba(102, 126, 234, 0.1);
        border-color: rgba(102, 126, 234, 0.4);
      }
      
      .bracket-column { 
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 190px;
      }
      @media (min-width: 640px) {
        .bracket-column { width: 260px; }
      }

      .bracket-stage-title {
        text-align: center;
        margin-bottom: 2rem;
        width: 100%;
      }

      .bracket-divider {
        width: 100%;
        height: 1px;
        background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
        margin: 2rem 0;
        position: relative;
      }
      .bracket-divider::after {
        content: 'LOWER BRACKET';
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        background: #05051a;
        padding: 0 1rem;
        color: rgba(255,255,255,0.1);
        font-size: 8px;
        font-weight: 900;
        letter-spacing: 0.3em;
        white-space: nowrap;
      }
      .bracket-container {
        scrollbar-width: thin;
        scrollbar-color: rgba(102, 126, 234, 0.3) transparent;
      }
      .bracket-container::-webkit-scrollbar {
        height: 6px;
      }
      .bracket-container::-webkit-scrollbar-thumb {
        background: rgba(102, 126, 234, 0.3);
        border-radius: 10px;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js",
        "lucide": "https://unpkg.com/lucide@0.479.0/dist/esm/lucide.js"
      }
    }
    </script>
  </head>
  <body class="bg-[#020210] text-white overflow-x-hidden font-['Inter']">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
